# Taskfile.yml — dataspace-control-plane
# go-task equivalent of the Makefile. Install: https://taskfile.dev/installation/
#
# Usage:
#   task install        install all dependencies
#   task test           run all unit tests (no live services)
#   task test:gates     run release gate suites (live services required)
#   task lint           run all linters
#   task clean          remove build artifacts

version: '3'

vars:
  PYTHON: python3
  UV: uv
  PNPM: pnpm
  PYTEST: pytest
  COVERAGE_XML: coverage.xml
  PYTEST_COV: --cov --cov-config=.coveragerc --cov-branch --cov-report=xml:coverage.xml
  LOCAL_TEST_PATHS: tests/unit tests/compatibility/test_schema_meta_compliance.py
  GATE_TEST_PATHS: tests/integration tests/e2e tests/compatibility/dsp-tck tests/compatibility/dcp-tck tests/tenancy tests/crypto-boundaries
  CHAOS_TEST_PATHS: tests/chaos

# ─── Default ──────────────────────────────────────────────────────────────────

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list
    silent: true

  # ─── Install ────────────────────────────────────────────────────────────────

  install:
    desc: Install all package dependencies
    deps: [install:python, install:node]

  install:python:
    desc: Install all Python packages in editable mode (uv)
    cmds:
      - >
        {{.UV}} pip install
        -e core
        -e adapters
        -e procedures
        -e packs
        -e apps/control-api
        -e apps/temporal-workers
        -e apps/provisioning-agent

  install:node:
    desc: Install web-console Node dependencies (pnpm)
    cmds:
      - "{{.PNPM}} --dir apps/web-console install"

  # ─── Unit / no-live-services tests ──────────────────────────────────────────

  test:
    desc: Run all tests that do not require live services
    cmds:
      - task: test:unit

  test:unit:
    desc: Run the repo-wide default spine (unit + schema compatibility)
    cmds:
      - "{{.PYTEST}} {{.LOCAL_TEST_PATHS}} {{.PYTEST_COV}}"

  test:core:
    desc: Verify core/ semantic layer (unit + tenancy)
    cmds:
      - pytest tests/unit -k core
      - pytest tests/tenancy -k core

  test:schemas:
    desc: Verify schemas/ artifact layer (unit + offline schema validation)
    cmds:
      - pytest tests/unit -k schemas

  test:procedures:
    desc: Verify procedures/ orchestration layer (unit + replay)
    cmds:
      - pytest tests/unit -k procedures
      - pytest tests/unit -k replay

  test:adapters:
    desc: Verify adapters/ integration layer (pure-Python adapter tests)
    cmds:
      - pytest tests/integration -k adapters

  test:packs:
    desc: Verify packs/ overlay layer
    cmds:
      - pytest tests/unit -k packs
      - pytest tests/integration -k packs

  test:apps:
    desc: Verify apps/ runtime surfaces
    cmds:
      - pytest tests/integration -k apps
      - pytest tests/e2e -k web_console

  test:infra:
    desc: Verify infra/ delivery substrate (helm lint + terraform validate)
    cmds:
      - bash infra/helm/scripts/lint.sh
      - for: { glob: "infra/terraform/environments/*/" }
        cmd: terraform -chdir={{.ITEM}} validate

  test:docs:
    desc: Verify docs/ explanation layer (markdownlint + link check)
    cmds:
      - markdownlint docs
      - pytest tests/unit -k docs_links

  # ─── Release gate suites (live services required) ───────────────────────────

  test:gates:
    desc: Run all release gate suites (Temporal, Kafka, Vault, Postgres required)
    cmds:
      - "{{.PYTEST}} {{.GATE_TEST_PATHS}} --live-services {{.PYTEST_COV}}"

  test:chaos:
    desc: Run chaos tests (live services + fault-injection environment required)
    cmds:
      - "{{.PYTEST}} {{.CHAOS_TEST_PATHS}} --live-services {{.PYTEST_COV}}"

  # ─── Lint ───────────────────────────────────────────────────────────────────

  lint:
    desc: Run all linters
    deps: [lint:python, lint:node, lint:docs, lint:infra]

  lint:python:
    desc: Lint Python with ruff
    cmds:
      - >
        ruff check
        core adapters procedures packs
        apps/control-api apps/temporal-workers apps/provisioning-agent
        tests

  lint:node:
    desc: Lint web-console TypeScript/React with ESLint (via pnpm)
    cmds:
      - "{{.PNPM}} --dir apps/web-console run lint"

  lint:docs:
    desc: Lint Markdown documentation with markdownlint
    cmds:
      - markdownlint docs

  lint:infra:
    desc: Lint Helm charts
    cmds:
      - bash infra/helm/scripts/lint.sh

  # ─── Docs site ──────────────────────────────────────────────────────────────

  docs:serve:
    desc: Serve the MkDocs Material docs site locally
    cmds:
      - mkdocs serve

  docs:build:
    desc: Build the MkDocs Material docs site to site/ (strict mode)
    cmds:
      - mkdocs build --strict

  # ─── Clean ──────────────────────────────────────────────────────────────────

  clean:
    desc: Remove build artifacts (__pycache__, .pytest_cache, dist, egg-info, site)
    cmds:
      - >
        find . -type d \(
        -name '__pycache__' -o
        -name '.pytest_cache' -o
        -name '*.egg-info' -o
        -name 'dist' -o
        -name '.ruff_cache'
        \) -not -path './.git/*' -exec rm -rf {} + 2>/dev/null || true
      - rm -rf site
