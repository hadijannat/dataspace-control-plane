# collector.test.yaml — Minimal OTel Collector config for CI integration tests
#
# Used by compose.test.yaml.
# Only OTLP receiver + debug exporter + health check.
# No Prometheus, no Loki, no Tempo — CI tests assert on spans/metrics via SDK,
# not on backend storage.
#
# This config is intentionally minimal to reduce test setup time and avoid
# spurious failures due to backend connectivity.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 50
  memory_limiter:
    limit_mib: 128
    spike_limit_mib: 32
    check_interval: 5s

exporters:
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
  telemetry:
    logs:
      level: warn
    metrics:
      address: 0.0.0.0:8888
