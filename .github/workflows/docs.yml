name: docs

on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "Taskfile.yml"
      - "mkdocs.yml"
      - "docs/**"
      - "tests/unit/docs/**"
      - "apps/control-api/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "Taskfile.yml"
      - "mkdocs.yml"
      - "docs/**"
      - "tests/unit/docs/**"
      - "apps/control-api/**"

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Python dependencies
        run: make install-python

      - name: Install docs Node dependencies
        run: pnpm --dir docs install --frozen-lockfile

      - name: Run docs verification
        run: make test-docs

      - name: Upload built site
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site/
