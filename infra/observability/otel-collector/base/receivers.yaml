receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318

  # Self-monitoring: scrape the collector's own metrics
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 30s
          static_configs:
            - targets: [localhost:8888]

  # Host metrics — only enabled in node-agent profile.
  # Enable by including this receiver in the relevant pipeline.
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points: ["/dev", "/proc", "/sys", "/run/k8s-pods"]
          match_type: strict
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network: {}
      load: {}
      processes: {}
