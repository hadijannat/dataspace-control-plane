component-definition:
  uuid: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
  metadata:
    title: "Dataspace Control Plane Component Definition"
    last-modified: "2026-03-14T00:00:00Z"
    version: "0.1.0"
    oscal-version: "1.1.2"
    remarks: |
      This OSCAL component definition documents the platform components and how
      they implement the controls required for Catena-X participation, ESPR DPP
      compliance, and Battery Passport compliance. Components map to the platform's
      runtime services and supporting infrastructure.
    props:
      - name: source-standard
        value: "Dataspace Control Plane Internal Control Baseline"
      - name: source-version
        value: "2026.03"
      - name: effective-date
        value: "2026-03-16"
      - name: pack-reference
        value: "packs/catenax/"
      - name: pack-reference
        value: "packs/espr_dpp/"
      - name: pack-reference
        value: "packs/battery_passport/"
    parties:
      - uuid: "party-platform-team"
        type: organization
        name: Dataspace Platform Team
    roles:
      - id: "implemented-by"
        title: "Implemented By"
      - id: "responsible-for"
        title: "Responsible For"
  components:
    - uuid: "comp-control-api"
      type: service
      title: Control API
      description: |
        FastAPI-based HTTP service implementing the control plane surface. Provides
        endpoints for company registration, contract negotiation initiation, usage event
        recording, and DPP lifecycle management. Validates Keycloak JWTs and enforces
        role-based access control.
      purpose: "Primary HTTP interface for operators and machine services"
      status:
        state: under-development
        remarks: "Endpoint implementations pending; OpenAPI spec committed at docs/api/openapi/source/control-api.yaml"
      responsible-roles:
        - role-id: "responsible-for"
          party-uuids:
            - "party-platform-team"
      control-implementations:
        - uuid: "ci-cx-control-api-001"
          source: "#catena-x-profile"
          description: "Control API implements Catena-X authentication and API surface requirements"
          implemented-requirements:
            - uuid: "ir-cx-dsp-01-control-api"
              control-id: cx-dsp-01
              description: "Control API exposes the DSP catalog endpoint at /api/v1/catalog (via edc-extension delegation)"
              statements:
                - statement-id: cx-dsp-01_smt.a
                  uuid: "stmt-cx-dsp-01-ca-a"
                  description: "The catalog endpoint accepts DSP CatalogRequest messages in JSON-LD format and returns DCAT catalog with ODRL policy offers"
                  remarks: "Implementation pending — edc-extension wires DSP handler to EDC connector framework"
            - uuid: "ir-cx-auth-control-api"
              control-id: cx-membership-01
              description: "Control API validates Keycloak JWTs on every request; enforces operator/viewer/service-account roles"
              statements:
                - statement-id: cx-membership-01_smt.a
                  uuid: "stmt-cx-membership-01-ca-a"
                  description: "JWT validation uses JWKS endpoint from Keycloak; tenant_id claim used as RLS session variable"

    - uuid: "comp-temporal-workers"
      type: service
      title: Temporal Workers
      description: |
        Durable workflow execution engine for multi-step business processes. Implements
        Temporal activities for: Keycloak realm provisioning, Vault Transit DID signing,
        ODRL policy evaluation, DCP credential verification, DPP registry submission,
        and evidence emission.
      purpose: "Durable orchestration of all multi-step business workflows"
      status:
        state: under-development
        remarks: "Workflow structure defined; activity implementations pending Wave 2"
      control-implementations:
        - uuid: "ci-cx-temporal-001"
          source: "#catena-x-profile"
          description: "Temporal workers implement ODRL policy evaluation, VC issuance, and agreement signing workflows"
          implemented-requirements:
            - uuid: "ir-cx-vc-01-temporal"
              control-id: cx-vc-01
              description: "Issues W3C VC 2.0 DataspaceParticipantCredentials and MembershipCredentials via trust workflow"
              statements:
                - statement-id: cx-vc-01_smt.a
                  uuid: "stmt-cx-vc-01-tw-a"
                  description: "CredentialIssuanceWorkflow in procedures/trust/ issues VCs with Data Integrity proofs. Signing performed via Vault Transit — private key never exposed to workflow code."
                - statement-id: cx-vc-01_smt.b
                  uuid: "stmt-cx-vc-01-tw-b"
                  description: "VC status is tracked using Bitstring Status List; revocation updates the status bit without re-issuing the credential"
            - uuid: "ir-cx-odrl-01-temporal"
              control-id: cx-odrl-01
              description: "ContractNegotiationWorkflow evaluates ODRL policies using the Catena-X pack profile"
              statements:
                - statement-id: cx-odrl-01_smt.a
                  uuid: "stmt-cx-odrl-01-tw-a"
                  description: "packs/catenax/policy_profile/ defines allowed ODRL constraints; PackReducer applies the Catena-X pack during negotiation"
            - uuid: "ir-cx-audit-01-temporal"
              control-id: cx-audit-01
              description: "All workflow activities emit evidence envelopes signed via Vault Transit to the append-only evidence_records table"
              statements:
                - statement-id: cx-audit-01_smt.a
                  uuid: "stmt-cx-audit-01-tw-a"
                  description: "Evidence envelope schema: schemas/dpp/source/exports/evidence-envelope.schema.json. Vault audit log records every signing operation."

    - uuid: "comp-vault-transit"
      type: service
      title: Vault Transit Engine
      description: |
        HashiCorp Vault Transit secrets engine. Provides cryptographic signing, verification,
        and hashing operations without exposing private key material. All signing keys created
        with exportable=false. Vault audit backend logs every operation.
      purpose: "Cryptographic boundary — signing without key export"
      status:
        state: operational
        remarks: "Vault deployed and configured; Transit keys provisioned with exportable=false"
      control-implementations:
        - uuid: "ci-crypto-vault-001"
          source: "#catena-x-profile"
          description: "Vault Transit provides the cryptographic boundary for all VC signing and evidence artifact signing"
          implemented-requirements:
            - uuid: "ir-cx-vc-sign-vault"
              control-id: cx-vc-01
              description: "All VC Data Integrity proofs and evidence envelope proofs are signed via Vault Transit; private keys never exported"
              statements:
                - statement-id: cx-vc-01_smt_platform
                  uuid: "stmt-cx-vc-01-vt-a"
                  description: "Transit keys created with exportable=false and allow_plaintext_backup=false. Vault audit log records caller identity, key name, and key version for every signing operation."
              links:
                - href: "../../../adr/0004-vault-transit-for-signing-keys.md"
                  rel: "reference"

    - uuid: "comp-postgres-rls"
      type: software
      title: PostgreSQL with Row-Level Security
      description: |
        PostgreSQL database with Row-Level Security policies on all tenant-scoped tables.
        The application connects as a non-superuser role (dataspace_app). The app.tenant_id
        session variable is set from the validated JWT claim before each transaction.
      purpose: "Tenant-isolated persistent storage with database-layer access enforcement"
      status:
        state: operational
        remarks: "PostgreSQL deployed with RLS; schema migrations applied"
      control-implementations:
        - uuid: "ci-tenancy-postgres-001"
          source: "#catena-x-profile"
          description: "PostgreSQL RLS enforces tenant isolation as the final defense layer"
          implemented-requirements:
            - uuid: "ir-cx-membership-tenancy"
              control-id: cx-membership-01
              description: "Tenant isolation ensures each Catena-X participant's data is accessible only to that participant's authenticated context"
              statements:
                - statement-id: cx-membership-01_smt.b
                  uuid: "stmt-cx-membership-01-pg-a"
                  description: "RLS policies on companies, agreements, passports, evidence_records, and metering_contexts tables. Policy: WHERE tenant_id = current_setting('app.tenant_id'). Verified by tests/tenancy/test_cross_tenant_isolation.py."

    - uuid: "comp-catenax-pack"
      type: software
      title: Catena-X Pack
      description: |
        The packs/catenax/ module provides ODRL policy profile validation, Catena-X VC type
        definitions, and DSP compliance rules as a pure overlay over core/ semantics.
        Applied by the PackReducer during contract negotiation and VC issuance workflows.
      purpose: "Catena-X ecosystem overlay — ODRL profiles, VC types, DSP compliance rules"
      status:
        state: under-development
        remarks: "Pack structure implemented; ODRL evaluator and full VC type coverage pending Wave 2"
      control-implementations:
        - uuid: "ci-cx-pack-001"
          source: "#catena-x-profile"
          description: "Catena-X pack implements ODRL policy profile and VC type requirements"
          implemented-requirements:
            - uuid: "ir-cx-odrl-01-pack"
              control-id: cx-odrl-01
              description: "packs/catenax/ defines the Catena-X ODRL constraint vocabulary (cx:BPN, cx:UsagePurpose, cx:FrameworkAgreement) and validates policy offers against this vocabulary"
  back-matter:
    resources:
      - uuid: "res-adr-0004"
        title: "ADR-0004: Vault Transit for Signing Keys"
        rlinks:
          - href: "../../../adr/0004-vault-transit-for-signing-keys.md"
      - uuid: "res-adr-0005"
        title: "ADR-0005: Packs as Pure Overlays"
        rlinks:
          - href: "../../../adr/0005-packs-as-pure-overlay.md"
