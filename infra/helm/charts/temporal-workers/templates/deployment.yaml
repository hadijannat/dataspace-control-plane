apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "temporal-workers.fullname" . }}
  labels:
    {{- include "temporal-workers.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "temporal-workers.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "temporal-workers.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "temporal-workers.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Workers do not serve HTTP — no ports exposed except internal metrics
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: LOG_LEVEL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: TEMPORAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: TEMPORAL_HOST
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: TEMPORAL_NAMESPACE
            - name: TEMPORAL_TASK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: TEMPORAL_TASK_QUEUE
            - name: TEMPORAL_MAX_CONCURRENT_ACTIVITIES
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: TEMPORAL_MAX_CONCURRENT_ACTIVITIES
            - name: TEMPORAL_MAX_CONCURRENT_WORKFLOWS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "temporal-workers.fullname" . }}-config
                  key: TEMPORAL_MAX_CONCURRENT_WORKFLOWS
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.vaultSecretName }}
                  key: VAULT_ADDR
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.vaultSecretName }}
                  key: VAULT_TOKEN
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgresSecretName }}
                  key: DATABASE_URL
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault-signing-keys
              mountPath: /run/secrets/vault
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: vault-signing-keys
          secret:
            secretName: {{ .Values.secrets.vaultSecretName }}
            optional: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
