# collector.yaml — base OTel Collector pipeline config (vendor-neutral)
#
# This file defines the full pipeline topology but uses environment variable
# references for all endpoints and auth tokens. Override endpoint values in
# env/ overlays (dev.yaml, staging.yaml, prod-eu.yaml).
#
# Profiles (profiles/) activate different component sets for different
# deployment modes (gateway, node-agent, debug).
#
# USAGE:
#   For Docker Compose: use docker/collector.dev.yaml (self-contained)
#   For Kubernetes: deploy via the OTel Collector Helm chart with values from helm/
#
# SECURITY:
#   - Auth tokens MUST come from env vars (injected by Vault Agent or ESO in K8s)
#   - Never hardcode endpoints or tokens in this file
#   - The redaction processor must appear in all pipelines carrying user data

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 30s
          static_configs:
            - targets: [localhost:8888]

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048

  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s

  resource:
    attributes:
      - key: deployment.environment
        from_attribute: DEPLOYMENT_ENVIRONMENT
        action: upsert

  redaction:
    allow_all_keys: true
    blocked_values:
      - "(?i)password"
      - "(?i)token"
      - "(?i)secret"
      - "(?i)private.key"
      - "(?i)authorization"
    summary: debug

  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
        - k8s.pod.name
        - k8s.pod.uid
        - k8s.namespace.name
        - k8s.node.name
        - k8s.deployment.name
      labels:
        - tag_name: app
          key: app.kubernetes.io/name
          from: pod
        - tag_name: version
          key: app.kubernetes.io/version
          from: pod
    pod_association:
      - sources:
          - from: resource_attribute
            name: k8s.pod.ip
      - sources:
          - from: connection

exporters:
  otlp/tempo:
    endpoint: ${TEMPO_ENDPOINT}
    tls:
      insecure: false
    headers:
      authorization: Bearer ${TEMPO_TOKEN}

  prometheusremotewrite:
    endpoint: ${PROMETHEUS_REMOTE_WRITE_URL}
    tls:
      insecure: false
    headers:
      authorization: Bearer ${PROMETHEUS_TOKEN}
    resource_to_telemetry_conversion:
      enabled: true

  loki:
    endpoint: ${LOKI_ENDPOINT}
    tls:
      insecure: false
    headers:
      authorization: Bearer ${LOKI_TOKEN}
    default_labels_enabled:
      exporter: false
      job: true
      instance: true
      level: true

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  memory_ballast:
    size_mib: 128

service:
  extensions: [health_check, memory_ballast]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, k8sattributes, redaction, batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, resource, k8sattributes, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, k8sattributes, redaction, batch]
      exporters: [loki]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
