exporters:
  # Forward all telemetry to the gateway collector via OTLP
  otlp/gateway:
    endpoint: ${GATEWAY_OTLP_ENDPOINT}
    tls:
      insecure: false
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s

service:
  pipelines:
    metrics:
      receivers: [hostmetrics, otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/gateway]
