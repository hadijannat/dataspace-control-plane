# Values for the official OpenTelemetry Collector Helm chart — production EU
# Uses gateway profile with HPA, strict TLS, Vault-injected auth tokens.

mode: deployment
replicaCount: 3

image:
  repository: otel/opentelemetry-collector-contrib
  # Pin to digest in production
  tag: "0.104.0"
  pullPolicy: IfNotPresent

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
          max_recv_msg_size_mib: 32
        http:
          endpoint: 0.0.0.0:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector-prod-eu
            scrape_interval: 30s
            static_configs:
              - targets: [localhost:8888]

  processors:
    batch:
      timeout: 10s
      send_batch_size: 2048
      send_batch_max_size: 4096
    memory_limiter:
      limit_mib: 1024
      spike_limit_mib: 256
      check_interval: 5s
    resource:
      attributes:
        - key: deployment.environment
          value: prod-eu
          action: upsert
        - key: service.region
          value: eu
          action: upsert
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.namespace.name
          - k8s.node.name
          - k8s.deployment.name
          - k8s.replicaset.name
      labels:
        - tag_name: app
          key: app.kubernetes.io/name
          from: pod
        - tag_name: version
          key: app.kubernetes.io/version
          from: pod
    redaction:
      allow_all_keys: true
      blocked_values:
        - "(?i)password"
        - "(?i)token"
        - "(?i)secret"
        - "(?i)private.key"
        - "(?i)authorization"
        - "(?i)api.key"
        - "(?i)client.secret"
      summary: debug

  exporters:
    otlp/tempo:
      endpoint: ${TEMPO_ENDPOINT}
      tls:
        insecure: false
        min_version: "1.2"
      headers:
        authorization: Bearer ${TEMPO_TOKEN}
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 60s
      sending_queue:
        enabled: true
        num_consumers: 20
        queue_size: 5000
    prometheusremotewrite:
      endpoint: ${PROMETHEUS_REMOTE_WRITE_URL}
      tls:
        insecure: false
        min_version: "1.2"
      headers:
        authorization: Bearer ${PROMETHEUS_TOKEN}
      resource_to_telemetry_conversion:
        enabled: true
    loki:
      endpoint: ${LOKI_ENDPOINT}
      tls:
        insecure: false
        min_version: "1.2"
      headers:
        authorization: Bearer ${LOKI_TOKEN}

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    memory_ballast:
      size_mib: 256

  service:
    extensions: [health_check, memory_ballast]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, k8sattributes, redaction, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, resource, k8sattributes, batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, k8sattributes, redaction, batch]
        exporters: [loki]
    telemetry:
      logs:
        level: warn
      metrics:
        address: 0.0.0.0:8888

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  annotations: {}

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"
  prometheus.io/path: "/metrics"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - opentelemetry-collector
          topologyKey: kubernetes.io/hostname
