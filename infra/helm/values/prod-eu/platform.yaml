# Production EU umbrella overlay
# Applied over charts/platform/values.yaml
#
# REQUIRED: Update image.tag for each component with sha256 digest before release.

global:
  imageRegistry: ghcr.io/your-org/dataspace-control-plane
  imagePullPolicy: IfNotPresent
  otelEndpoint: "http://otel-collector:4317"

control-api:
  enabled: true
  replicaCount: 3
  image:
    tag: "sha256:REPLACE_WITH_REAL_DIGEST"
  config:
    logLevel: WARNING
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

temporal-workers:
  enabled: true
  replicaCount: 3
  image:
    tag: "sha256:REPLACE_WITH_REAL_DIGEST"
  config:
    logLevel: WARNING
    temporalMaxConcurrentActivities: 20
    temporalMaxConcurrentWorkflows: 10
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15

web-console:
  enabled: true
  replicaCount: 3
  image:
    tag: "sha256:REPLACE_WITH_REAL_DIGEST"
  config:
    keycloakUrl: "https://keycloak.eu.dataspace.example.com"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

provisioning-agent:
  enabled: true
  replicaCount: 1
  image:
    tag: "sha256:REPLACE_WITH_REAL_DIGEST"
  config:
    logLevel: WARNING
