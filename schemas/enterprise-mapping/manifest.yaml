family: enterprise-mapping
version: "1.0.0"
description: "Schema DSL for source-model snapshots, field mappings, transform steps, lineage graphs, and mapping execution results — covering OData CSDL, SQL, event, and object-storage sources."
effective_from: "2026-03-14"

upstream_standards:
  - name: "OData 4.01 Protocol"
    version: "4.01"
    source_uri: "https://docs.oasis-open.org/odata/odata/v4.01/odata-v4.01-part1-protocol.html"
  - name: "OData 4.01 CSDL JSON"
    version: "4.01"
    source_uri: "https://docs.oasis-open.org/odata/odata-csdl-json/v4.01/"
  - name: "CloudEvents 1.0"
    version: "1.0"
    source_uri: "https://cloudevents.io/spec/cloudevents/"

validation_dialect: "https://json-schema.org/draft/2020-12/schema"

artifact_classes:
  - source
  - bundles
  - examples

downstream_consumers:
  - adapters
  - procedures
  - core

ci_gates:
  - "python schemas/tools/validate.py --family enterprise-mapping"
  - "pytest tests/unit -k enterprise_mapping_schemas"

notes: |
  The DSL is JSON Schema-based. Source-native models (OData CSDL, SQL DDL, etc.)
  are referenced by DSL specs, not inlined.
  Every mapping spec must require lineage for every target field.
  Keep mapping-definition schemas separate from execution-run schemas.
  Allow event-source references but do not force CloudEvents on all sources.
