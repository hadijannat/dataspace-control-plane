# Values for the official OpenTelemetry Collector Helm chart
# Chart: open-telemetry/opentelemetry-collector
# Repo:  https://open-telemetry.github.io/opentelemetry-helm-charts
#
# Install:
#   helm repo add open-telemetry https://open-telemetry.github.io/opentelemetry-helm-charts
#   helm upgrade --install otel-collector open-telemetry/opentelemetry-collector \
#     --namespace observability \
#     -f infra/observability/otel-collector/helm/values.dev.yaml

mode: deployment
replicaCount: 1

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.104.0"
  pullPolicy: IfNotPresent

# Dev uses the debug profile — see profiles/debug.yaml for the inline equivalent
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      timeout: 1s
    memory_limiter:
      limit_mib: 256
      spike_limit_mib: 64
      check_interval: 5s

  exporters:
    debug:
      verbosity: basic
    prometheusremotewrite:
      endpoint: http://prometheus:9090/api/v1/write
      tls:
        insecure: true
    loki:
      endpoint: http://loki:3100/loki/api/v1/push
      tls:
        insecure: true

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133

  service:
    extensions: [health_check]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [debug]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite, debug]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [loki, debug]
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

serviceAccount:
  create: true

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"
  prometheus.io/path: "/metrics"
