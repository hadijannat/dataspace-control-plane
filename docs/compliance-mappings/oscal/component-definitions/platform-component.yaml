        title: "Tenancy Test Suite"
        rlinks:
          - href: "../../../../tests/tenancy/"
      - uuid: "res-crypto-boundary-tests"
        title: "Crypto Boundary Test Suite"
        rlinks:
          - href: "../../../../tests/crypto-boundaries/"
