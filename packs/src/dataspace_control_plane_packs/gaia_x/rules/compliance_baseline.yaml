baseline_requirements:
  - Legal entity must be registered in an EU member state or equivalent jurisdiction
  - Self-description must be a valid Verifiable Credential using Gaia-X ontology
  - Compliance credential is issued by a Gaia-X-accredited notary
  - Federated catalogue entry must reference compliance credential
  - Trust anchors are configured per federation (not universal)
