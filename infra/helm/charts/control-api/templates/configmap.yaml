apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "control-api.fullname" . }}-config
  labels:
    {{- include "control-api.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ coalesce .Values.config.otlpEndpoint .Values.global.otelEndpoint "" | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.config.temporalNamespace | quote }}
  TEMPORAL_TASK_QUEUE: {{ .Values.config.temporalTaskQueue | quote }}
