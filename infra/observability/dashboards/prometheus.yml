global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: local
    cluster: docker-compose

rule_files:
  - /etc/prometheus/recording-rules/*.yaml
  - /etc/prometheus/alerts/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  # OTel Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8888]
    relabel_configs:
      - target_label: environment
        replacement: local

  # control-api app metrics (direct scrape for local dev)
  - job_name: control-api
    static_configs:
      - targets: [control-api:8080]
    metrics_path: /metrics

  # temporal-workers metrics
  - job_name: temporal-workers
    static_configs:
      - targets: [temporal-workers:8081]
    metrics_path: /metrics

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Kubernetes pod annotation-based scraping (used in K8s deployments)
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
        action: replace
        regex: "(https?)"
        target_label: __scheme__
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels:
          - __meta_kubernetes_pod_ip
          - __meta_kubernetes_pod_annotation_prometheus_io_port
        action: replace
        target_label: __address__
        regex: (.+);(\d+)
        replacement: ${1}:${2}
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
