apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "temporal-workers.fullname" . }}-config
  labels:
    {{- include "temporal-workers.labels" . | nindent 4 }}
data:
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otlpEndpoint | quote }}
  TEMPORAL_HOST: {{ .Values.config.temporalHost | quote }}
  TEMPORAL_NAMESPACE: {{ .Values.config.temporalNamespace | quote }}
  TEMPORAL_TASK_QUEUE: {{ .Values.config.temporalTaskQueue | quote }}
  TEMPORAL_MAX_CONCURRENT_ACTIVITIES: {{ .Values.config.temporalMaxConcurrentActivities | quote }}
  TEMPORAL_MAX_CONCURRENT_WORKFLOWS: {{ .Values.config.temporalMaxConcurrentWorkflows | quote }}
