# Generated from base + debug profile + dev env. Do not edit directly.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
      - job_name: otel-collector
        scrape_interval: 30s
        static_configs:
        - targets:
          - localhost:8888
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      disk: {}
      filesystem:
        exclude_mount_points:
          mount_points:
          - /dev
          - /proc
          - /sys
          - /run/k8s-pods
          match_type: strict
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network: {}
      load: {}
      processes: {}
processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
    send_batch_max_size: 2048
  memory_limiter:
    limit_mib: 512
    spike_limit_mib: 128
    check_interval: 5s
  resource:
    attributes:
    - key: deployment.environment
      from_attribute: DEPLOYMENT_ENVIRONMENT
      action: upsert
  redaction:
    allow_all_keys: true
    blocked_values:
    - (?i)password
    - (?i)token
    - (?i)secret
    - (?i)private.key
    - (?i)authorization
    - (?i)api.key
    - (?i)client.secret
    summary: debug
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    extract:
      metadata:
      - k8s.pod.name
      - k8s.pod.uid
      - k8s.pod.start_time
      - k8s.namespace.name
      - k8s.node.name
      - k8s.deployment.name
      - k8s.replicaset.name
      labels:
      - tag_name: app
        key: app.kubernetes.io/name
        from: pod
      - tag_name: version
        key: app.kubernetes.io/version
        from: pod
      - tag_name: component
        key: app.kubernetes.io/component
        from: pod
    pod_association:
    - sources:
      - from: resource_attribute
        name: k8s.pod.ip
    - sources:
      - from: connection
exporters:
  otlp/tempo:
    endpoint: http://tempo:4317
    tls:
      insecure: true
    headers: {}
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 1000
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    headers: {}
    resource_to_telemetry_conversion:
      enabled: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true
    headers: {}
    default_labels_enabled:
      exporter: false
      job: true
      instance: true
      level: true
    retry_on_failure:
      enabled: true
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200
extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  memory_ballast:
    size_mib: 128
  pprof:
    endpoint: localhost:1777
    block_profile_fraction: 0
    mutex_profile_fraction: 0
  zpages:
    endpoint: localhost:55679
service:
  extensions:
  - health_check
  - memory_ballast
  - pprof
  - zpages
  telemetry:
    logs:
      level: debug
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers:
      - otlp
      processors:
      - memory_limiter
      - batch
      exporters:
      - debug
    metrics:
      receivers:
      - otlp
      - prometheus
      processors:
      - memory_limiter
      - batch
      exporters:
      - prometheusremotewrite
      - debug
    logs:
      receivers:
      - otlp
      processors:
      - memory_limiter
      - batch
      exporters:
      - loki
      - debug
