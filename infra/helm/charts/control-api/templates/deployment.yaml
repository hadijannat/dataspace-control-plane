apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-api.fullname" . }}
  labels:
    {{- include "control-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "control-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "control-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "control-api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "control-api.image" . | quote }}
          imagePullPolicy: {{ include "control-api.imagePullPolicy" . }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "control-api.fullname" . }}-config
                  key: LOG_LEVEL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "control-api.fullname" . }}-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "control-api.fullname" . }}-config
                  key: TEMPORAL_NAMESPACE
            - name: TEMPORAL_TASK_QUEUE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "control-api.fullname" . }}-config
                  key: TEMPORAL_TASK_QUEUE
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgresSecretName }}
                  key: DATABASE_URL
            - name: VAULT_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.vaultSecretName }}
                  key: VAULT_ADDR
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.vaultSecretName }}
                  key: VAULT_TOKEN
            - name: KEYCLOAK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloakSecretName }}
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloakSecretName }}
                  key: CLIENT_SECRET
            # --- New settings from PR #1 ---
            - name: CONTROL_API_STREAM_TICKET_TTL_SECONDS
              value: {{ .Values.env.streamTicketTtlSeconds | quote }}
            - name: CONTROL_API_STREAM_POLL_INTERVAL_SECONDS
              value: {{ .Values.env.streamPollIntervalSeconds | quote }}
            - name: CONTROL_API_DOCS_PUBLIC
              value: {{ .Values.env.docsPublic | quote }}
            - name: CONTROL_API_TENANT_BANNER
              value: {{ .Values.env.tenantBanner | quote }}
            - name: CONTROL_API_KEYCLOAK_BROWSER_URL
              value: {{ .Values.env.keycloakBrowserUrl | quote }}
            - name: CONTROL_API_KEYCLOAK_BROWSER_REALM
              value: {{ .Values.env.keycloakBrowserRealm | quote }}
            - name: CONTROL_API_KEYCLOAK_BROWSER_CLIENT_ID
              value: {{ .Values.env.keycloakBrowserClientId | quote }}
            - name: CONTROL_API_PUBLIC_BASE_URL
              value: {{ .Values.env.publicBaseUrl | quote }}
            # Secrets — sourced from the control-api-secrets Secret, not values.yaml
            - name: CONTROL_API_STREAM_TICKET_SECRET
              valueFrom:
                secretKeyRef:
                  name: control-api-secrets
                  key: STREAM_TICKET_SECRET
            - name: CONTROL_API_WEBHOOK_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: control-api-secrets
                  key: WEBHOOK_SHARED_SECRET
                  optional: true
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
