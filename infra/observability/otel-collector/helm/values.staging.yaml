# Values for the official OpenTelemetry Collector Helm chart — staging
# Uses gateway profile: full pipeline with K8s enrichment, TLS exporters.

mode: deployment
replicaCount: 2

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.104.0"
  pullPolicy: IfNotPresent

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    prometheus:
      config:
        scrape_configs:
          - job_name: otel-collector-staging
            scrape_interval: 30s
            static_configs:
              - targets: [localhost:8888]

  processors:
    batch:
      timeout: 10s
      send_batch_size: 1024
    memory_limiter:
      limit_mib: 512
      spike_limit_mib: 128
      check_interval: 5s
    resource:
      attributes:
        - key: deployment.environment
          value: staging
          action: upsert
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.namespace.name
          - k8s.deployment.name
    redaction:
      allow_all_keys: true
      blocked_values:
        - "(?i)password"
        - "(?i)token"
        - "(?i)secret"

  exporters:
    otlp/tempo:
      endpoint: ${TEMPO_ENDPOINT}
      tls:
        insecure: false
      headers:
        authorization: Bearer ${TEMPO_TOKEN}
    prometheusremotewrite:
      endpoint: ${PROMETHEUS_REMOTE_WRITE_URL}
      tls:
        insecure: false
      headers:
        authorization: Bearer ${PROMETHEUS_TOKEN}
      resource_to_telemetry_conversion:
        enabled: true
    loki:
      endpoint: ${LOKI_ENDPOINT}
      tls:
        insecure: false
      headers:
        authorization: Bearer ${LOKI_TOKEN}

  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
    memory_ballast:
      size_mib: 128

  service:
    extensions: [health_check, memory_ballast]
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, k8sattributes, redaction, batch]
        exporters: [otlp/tempo]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, resource, k8sattributes, batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, k8sattributes, redaction, batch]
        exporters: [loki]
    telemetry:
      logs:
        level: info
      metrics:
        address: 0.0.0.0:8888

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

serviceAccount:
  create: true
  annotations:
    # Add IRSA/Workload Identity annotations here if applicable

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces", "nodes"]
      verbs: ["get", "watch", "list"]

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8888"
  prometheus.io/path: "/metrics"
