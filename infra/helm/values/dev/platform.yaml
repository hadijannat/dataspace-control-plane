# Dev environment umbrella overlay — enables all components
# Applied over charts/platform/values.yaml

global:
  imagePullPolicy: Always
  otelEndpoint: "http://otel-collector:4317"

control-api:
  enabled: true
  replicaCount: 1
  image:
    tag: "dev"
  config:
    logLevel: DEBUG

temporal-workers:
  enabled: true
  replicaCount: 1
  image:
    tag: "dev"
  config:
    logLevel: DEBUG
    temporalMaxConcurrentActivities: 5
    temporalMaxConcurrentWorkflows: 2

web-console:
  enabled: true
  replicaCount: 1
  image:
    tag: "dev"
  config:
    keycloakUrl: "http://keycloak.dev.dataspace.local"

provisioning-agent:
  enabled: false
