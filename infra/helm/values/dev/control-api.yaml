# Dev environment overlay for control-api
# Applied over charts/control-api/values.yaml

replicaCount: 1

image:
  tag: "dev"
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: control-api.dev.dataspace.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

config:
  logLevel: DEBUG
  otlpEndpoint: "http://otel-collector:4317"
  temporalNamespace: "dataspace"
  temporalTaskQueue: "control-api"

autoscaling:
  enabled: false
